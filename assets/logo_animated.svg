<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#200000"/>
      <stop offset="55%" stop-color="#0d0000"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cc0000" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#cc0000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur4">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="blur10">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="blur18">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- ── Outer ambient glow (pulsing) ── -->
  <circle cx="200" cy="200" r="195" fill="url(#glowGrad)">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <!-- ── Background disc ── -->
  <circle cx="200" cy="200" r="178" fill="url(#bgGrad)"/>

  <!-- ── Red ring (pulsing stroke) ── -->
  <circle cx="200" cy="200" r="176" fill="none" stroke="#cc0000" stroke-width="4" filter="url(#blur4)">
    <animate attributeName="stroke-width" values="2;6;2" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity"      values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="200" r="176" fill="none" stroke="#cc0000" stroke-width="1.5"/>

  <!-- ══════════════════════════════════
       MASCOT — angular "cracked" helmet
       ══════════════════════════════════ -->
  <!-- Main head shape -->
  <polygon
    points="200,95 255,105 298,130 315,170 312,215 295,250 270,272 248,284 200,290 152,284 130,272 105,250 88,215 85,170 102,130 145,105"
    fill="#cc0000"/>

  <!-- Shadow ridge on top -->
  <polygon points="200,95 230,100 240,115 200,112 160,115 170,100" fill="#a50000"/>

  <!-- ── Left eye socket ── -->
  <ellipse cx="163" cy="192" rx="28" ry="22" fill="#0a0000" transform="rotate(-8,163,192)"/>
  <!-- inner glint -->
  <ellipse cx="155" cy="185" rx="6" ry="4" fill="#cc0000" opacity="0.25"/>

  <!-- ── Right eye socket ── -->
  <ellipse cx="237" cy="192" rx="28" ry="22" fill="#0a0000" transform="rotate(8,237,192)"/>
  <ellipse cx="229" cy="185" rx="6" ry="4" fill="#cc0000" opacity="0.25"/>

  <!-- ── Mouth / chin gap ── -->
  <polygon
    points="155,240 175,232 200,236 225,232 245,240 240,265 225,278 200,282 175,278 160,265"
    fill="#0a0000"/>

  <!-- Fang left -->
  <polygon points="172,258 178,270 165,272" fill="#cc0000" opacity="0.7"/>
  <!-- Fang right -->
  <polygon points="228,258 222,270 235,272" fill="#cc0000" opacity="0.7"/>

  <!-- ── Crack lines for "corrupted" feel ── -->
  <polyline points="200,95 196,115 202,130 197,148" stroke="#ff2200" stroke-width="1.5" fill="none" opacity="0.7"/>
  <polyline points="102,130 115,143 108,158"         stroke="#ff2200" stroke-width="1.2" fill="none" opacity="0.5"/>
  <polyline points="298,130 285,143 292,158"         stroke="#ff2200" stroke-width="1.2" fill="none" opacity="0.5"/>

  <!-- ── Glow bloom behind mascot (animated) ── -->
  <circle cx="200" cy="192" r="90" fill="#cc0000" filter="url(#blur18)" opacity="0">
    <animate attributeName="opacity" values="0;0.18;0" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <!-- ── Eye red flicker ── -->
  <ellipse cx="163" cy="192" rx="10" ry="8" fill="#cc0000" filter="url(#blur4)" opacity="0"
           transform="rotate(-8,163,192)">
    <animate attributeName="opacity" values="0;0.55;0" dur="2.8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="237" cy="192" rx="10" ry="8" fill="#cc0000" filter="url(#blur4)" opacity="0"
           transform="rotate(8,237,192)">
    <animate attributeName="opacity" values="0;0.55;0" dur="2.8s" repeatCount="indefinite"/>
  </ellipse>
</svg>
