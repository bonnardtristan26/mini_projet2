<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LaDiscorde & crée notre compte !</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>LaDiscorde</h1>

<div id="chat-container">

    <div id="messages"></div>

    <div id="input-area">
        <input type="text" id="username" placeholder="Entrer un nom d'utilisateur">
        <input type="text" id="password" placeholder="Créer un mot de passe">
        <button onclick="sendMessage()">Inscription</button>
        <p>Vous avez déjà un compte ? se connecter</p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
