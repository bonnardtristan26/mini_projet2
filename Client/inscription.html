<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaDiscorde - Créer un Compte</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="/Ressource/Image/logo_LaDiscorde_favicon.png">
</head>
<body>
    <!-- BACK BUTTON -->
    <a href="menu_principal.html" class="back-btn">← Retour</a>
    
    <!-- MAIN CONTENT -->
    <div class="main-content" style="flex: 1; display: flex; flex-direction: column; background: rgba(10, 10, 10, 0.5);">
        <!-- HEADER -->
        <div class="header">
            <div class="header-title">Créer un Compte</div>
            <div style="font-size: 13px; color: rgba(200, 200, 200, 0.7);">Rejoignez notre communauté</div>
        </div>
        
        <!-- CONTENT AREA -->
        <div class="content signup-page">
            <div class="signup-container">
                <div style="text-align: center;">
                    <img src="../Ressource/Image/logo_LaDiscorde.png" alt="LaDiscorde Logo" class="form-logo">
                </div>
                <h2 class="signup-title"> Inscription</h2>
                
                <form id="signupForm">
                    <div class="form-group">
                        <label for="email">Adresse Email</label>
                        <input type="email" id="email" placeholder="Entrez votre email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="username">Nom d'utilisateur</label>
                        <input type="text" id="username" placeholder="Choisissez votre pseudo" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Mot de passe</label>
                        <input type="password" id="password" placeholder="Créez un mot de passe sécurisé" required>
                    </div>
                    
                    <button type="button" class="btn-signup" onclick="senduser()">Creer mon Compte</button>
                </form>
                
                <div class="signup-links">
                    <p>Vous avez déjà un compte ? <a href="login.html" id="connection">Se connecter</a></p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="partieClient.js"></script>
</body>
</html>
