<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaDiscorde - Se Connecter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="/Ressource/Image/logo_LaDiscorde_favicon.png">
</head>
<body>
    <!-- BACK BUTTON -->
    <a href="menu_principal.html" class="back-btn">← Retour</a>
    
    <!-- MAIN CONTENT -->
    <div class="main-content" style="flex: 1; display: flex; flex-direction: column; background: rgba(10, 10, 10, 0.5);">
        <!-- HEADER -->
        <div class="header">
            <div class="header-title">Se Connecter</div>
            <div style="font-size: 13px; color: rgba(200, 200, 200, 0.7);">Accédez à votre compte</div>
        </div>
        
        <!-- CONTENT AREA -->
        <div class="content login-page">
            <div class="login-container">
                <div style="text-align: center;">
                    <img src="../Ressource/Image/logo_LaDiscorde.png" alt="LaDiscorde Logo" class="form-logo">
                </div>
                <h2 class="login-title">Connexion</h2>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Nom d'utilisateur</label>
                        <input type="text" id="username" placeholder="Entrez votre pseudo" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Mot de passe</label>
                        <input type="password" id="password" placeholder="Entrez votre mot de passe" required>
                    </div>
                    
                    <button type="button" class="btn-login" onclick="login()">Se Connecter</button>
                </form>
                
                <div class="login-links">
                    <a href="https://tinyurl.com/resetmdp" id="connection">Mot de passe oublié ?</a>
                    <a href="inscription.html" id="retourinscription">Créer un compte</a>
                </div>
            </div>
        </div>
    </div>
    
    <script src="partieClient.js"></script>
</body>
</html>
