<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LaDiscorde & connecte toi !</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<style>
@font-face {
  font-family: "LoserMotoClub";
  src: url('../Ressource/Front/LoserMotoClub.ttf');
}
.title {
  font-family: "LoserMotoClub", sans-serif;
}
</style>

<style>
@font-face {
  font-family: "MaPolice";
  src: url('../Ressource/Front/DRExclusiveEditorial.ttf'); 
}
body {
  font-family: "MaPolice", sans-serif;
  background-image: url("../Ressource/Image/fond_LaDiscorde.png");
  background-repeat: no-repeat;
  background-size: 100%;
  background-position-y: 20%;
  margin: 0;
  color: white;
}
</style>

<!-- BARRE DU HAUT -->
<div style="position: fixed; top: 0; left: 0; width: 100%; height: 40px; background: rgba(10,10,10,0.90); border-bottom: 1px solid rgba(200,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 100;">
  <p class="title" style="font-size: 18px; margin: 0; color: white; letter-spacing: 2px;">LaDiscorde</p>
  <img src="../Ressource/Image/logo_LaDiscorde.png" style="width: 26px; height: auto; position: absolute; right: 16px;" alt="Logo LaDiscorde">
</div>

<div style="width: 360px;height: auto; margin: 120px auto;border: 2px solid rgba(255, 0, 0, 0.8);border-radius: 20px; background: linear-gradient(180deg, rgba(40, 40, 40, 0.95) 0%,rgba(10, 10, 10, 0.9) 100%); box-shadow: 0 0 25px rgba(255, 0, 0, 0.25); padding: 30px; text-align: center; color: white;">
    <div style="text-align: center">
    <img src="../Ressource/Image/logo_LaDiscorde.png" alt="le logo de LaDiscorde" style="width: 300px; height: auto;"/>
    <p style="font-size: 18px; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; margin: 14px 0 18px;">SE CONNECTER</p>
    <div id="logincreatecompte" style="text-align: center;">
        <input type="text" id="username" placeholder="Entrer un nom d'utilisateur"><BR>
        <input type="text" id="password" placeholder="Créer un mot de passe"><BR>
        <button onclick="login()">Connexion</button><BR><BR>
        <a id="connection" data-testid="connection" href="https://tinyurl.com/resetmdp">Mot de passe oublié ?</a>
    </div>
  </div>
</div>

<!-- BARRE DU BAS -->
<div style="position: fixed; bottom: 0; left: 0; width: 100%; height: 40px; background: rgba(10,10,10,0.90); border-top: 1px solid rgba(200,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 100;">
  <p style="color: rgba(200,200,200,0.7); font-size: 14px; margin: 0;">Connecter vous a votre compte</p>
</div>

<script src="partieClient.js"></script>
</body>
</html>
