<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chat WebSocket</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- BARRE DU HAUT -->
  <header class="topbar">
    <p class="app-title">LaDiscorde</p>
    <img src="/Ressource/Image/logo_LaDiscorde.png" alt="Logo LaDiscorde">
  </header>

  <div class="layout">

    <!-- COLONNE SERVEURS -->
    <nav class="servers">
      <div class="server-icon active" title="Chat général">
        <img src="/Ressource/Image/logo_LaDiscorde.png" alt="LaDiscorde">
      </div>
      <div class="server-icon" title="Serveur 2">🎮</div>
      <div class="server-icon" title="Serveur 3">🔥</div>
      <div class="server-icon" title="Ajouter" style="font-size:20px;color:rgba(200,0,0,0.5);">+</div>
    </nav>

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">Canaux</div>
      <div class="sidebar-list">
        <div class="channel-item active" data-channel="général" data-type="public">💬 général</div>
        <div class="channel-item" data-channel="annonces" data-type="public">📢 annonces</div>
        <div class="channel-item" data-channel="gaming" data-type="public">🎮 gaming</div>
        <div class="sidebar-header" style="margin-top:10px;">Messages privés</div>
        <div id="mp-list"></div>
      </div>
      <div class="sidebar-footer">
        <div class="avatar"></div>
        <span class="pseudo" id="pseudo-connecte">...</span>
        <button class="btn-deco" onclick="deconnecter()" title="Se déconnecter">⏻</button>
      </div>
    </aside>

    <!-- ZONE CHAT PRINCIPALE -->
    <main class="chat-zone">
      <div class="chat-header">
        <span>#</span> général
      </div>
      <div id="messages" style="display:none;"></div>
      <div id="welcome-zone" class="welcome-container">
        <img src="/Ressource/Image/logo_LaDiscorde.png" alt="LaDiscorde" class="welcome-logo">
        <h1>Bienvenue dans LaDiscorde</h1>
        <p>Sélectionne un utilisateur à gauche pour discuter en privé ou utilise les canaux publics</p>
      </div>
      <div id="input-zone" style="display:none;">
        <input type="text" id="messageInput" placeholder="Écris un message dans #général...">
        <button id="sendBtn" class="title">Envoyer</button>
      </div>
    </main>

    <!-- PANNEAU UTILISATEURS EN LIGNE -->
    <aside class="users-panel">
      <div class="users-header">
        <h3>En ligne</h3>
        <span class="online-count" id="online-count">0</span>
      </div>
      <div class="users-list" id="users-list"></div>
    </aside>

  </div>

  <!-- BARRE DU BAS -->
  <footer class="bottombar">
    <p>Chat général — LaDiscorde</p>
  </footer>

  <script>
    // Vérification session
    fetch('/verifier-session')
      .then(r => r.json())
      .then(data => {
        if (!data.connecte) {
          window.location.href = "login.html";
        } else {
          document.getElementById('pseudo-connecte').textContent = data.username;
        }
      });

    // Déconnexion
    async function deconnecter() {
      await fetch('/deconnexion', { method: 'POST' });
      window.location.href = "login.html";
    }
  </script>

  <script src="partieClient.js"></script>

</body>
</html>
